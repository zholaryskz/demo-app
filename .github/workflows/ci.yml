name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t demo-app:ci .
      - run: docker run -d --name app -p 8081:8080 demo-app:ci
      - run: |
          for i in {1..20}; do
            curl -fsS http://localhost:8081/health && exit 0
            sleep 2
          done
          exit 1
