version: "3.8"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: "pass123"
      POSTGRES_DB: "appdb"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      DB_HOST: "db"
      DB_NAME: "appdb"
      DB_USER: "postgres"
      DB_PASSWORD: "pass123"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
volumes:
  db_data: {}
